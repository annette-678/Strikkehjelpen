/* ---------- Firestore storage helpers ---------- */
async function loadData(key, uid, fallback) {
  if (!uid) return fallback;
  try {
    const snap = await window._db.collection("users").doc(uid)
      .collection("garnlager").doc(key).get();
    if (snap.exists) return snap.data().value ?? fallback;
  } catch(e) { console.error("Last feilet", key, e.code); }
  return fallback;
}
async function saveData(key, value, uid) {
  if (!uid) return false;
  try {
    await window._db.collection("users").doc(uid)
      .collection("garnlager").doc(key).set({ value });
    return true;
  } catch(e) { console.error("Lagring feilet", key, e.code); return false; }
}

/* ---------- image helpers ---------- */
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Resize image to keep storage small
function resizeImage(dataUrl, maxDim = 800, quality = 0.78) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width > height) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/* ---------- Google Identity Services innlogging ---------- */
function LoginScreen({ onLogin }) {
  const btnRef = useRef(null);
  const [error, setError] = useState(null);
  const [gsiReady, setGsiReady] = useState(false);

  useEffect(() => {
    function initGSI() {
      if (!window.google || !window.google.accounts) return;
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (response) => {
          try {
            const base64 = response.credential.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
            const payload = JSON.parse(atob(base64));
            const user = {
              uid: payload.sub,
              name: payload.name,
              email: payload.email,
              photoURL: payload.picture,
            };
            window._setStoredUser(user);
            onLogin(user);
          } catch(e) {
            setError("Innlogging feilet — prøv igjen.");
          }
        },
        ux_mode: "popup",
        auto_select: false,
        cancel_on_tap_outside: false,
      });

      // Render den offisielle Google-knappen direkte i btnRef
      if (btnRef.current) {
        window.google.accounts.id.renderButton(btnRef.current, {
          type: "standard",
          theme: "outline",
          size: "large",
          text: "signin_with",
          shape: "rectangular",
          logo_alignment: "left",
          width: 280,
          locale: "no",
        });
      }
      setGsiReady(true);
    }

    if (window.google && window.google.accounts) {
      initGSI();
    } else {
      const interval = setInterval(() => {
        if (window.google && window.google.accounts) {
          clearInterval(interval);
          initGSI();
        }
      }, 150);
      return () => clearInterval(interval);
    }
  }, []);

  return (
    <div className="garnlager-root">
      <style>{GARNLAGER_CSS}</style>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:20 }}>
        <div style={{ textAlign:"center", maxWidth:360 }}>
          <div style={{ fontSize:56, marginBottom:16 }}>🧶</div>
          <h1 style={{ fontFamily:"var(--font-display)", fontStyle:"italic", fontSize:38,
            margin:"0 0 10px 0", color:"var(--walnut)" }}>Garnlager</h1>
          <p style={{ color:"var(--walnut-soft)", fontSize:14, lineHeight:1.6, margin:"0 0 32px 0" }}>
            Logg inn med Google for å få tilgang til garnlageret ditt — synkronisert på alle enheter.
          </p>
          {error && (
            <p style={{ color:"var(--terracotta)", fontSize:13, marginBottom:16 }}>{error}</p>
          )}
          {/* Offisiell Google Sign-In knapp — fungerer i alle nettlesere */}
          <div ref={btnRef} style={{ display:"flex", justifyContent:"center", minHeight:44 }}>
            {!gsiReady && (
              <div style={{ color:"var(--walnut-soft)", fontSize:13 }}>Laster innlogging …</div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("garn");
  const [yarns, setYarns] = useState(null);
  const [tools, setTools] = useState(null);
  const [projects, setProjects] = useState(null);
  const [toast, setToast] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [user, setUser] = useState(undefined); // undefined = sjekker, null = ikke innlogget

  // Sjekk om bruker er lagret lokalt
  useEffect(() => {
    const stored = window._getStoredUser();
    if (stored && stored.uid) {
      setUser(stored);
    } else {
      setUser(null);
    }
  }, []);

  // Last data fra Firestore når bruker er satt
  useEffect(() => {
    if (!user || !user.uid) return;
    (async () => {
      const [y, t, p] = await Promise.all([
        loadData("yarns", user.uid, []),
        loadData("tools", user.uid, []),
        loadData("projects", user.uid, []),
      ]);
      setYarns(y); setTools(t); setProjects(p);
      setLoaded(true);
    })();
  }, [user]);

  // Auto-save med synlig status — kun etter at bruker har gjort endringer (ikke ved første lasting)
  const [saveStatus, setSaveStatus] = useState(null);
  const saveTimer = useRef(null);
  const initialLoad = useRef(true);

  async function doSave(key, value, uid) {
    setSaveStatus("lagrer");
    const ok = await saveData(key, value, uid);
    setSaveStatus(ok ? "lagret" : "feil");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaveStatus(null), 2500);
  }

  useEffect(() => {
    if (!loaded || !user || yarns === null) return;
    if (initialLoad.current) return; // ikke lagre ved første lasting
    doSave("yarns", yarns, user.uid);
  }, [yarns]);

  useEffect(() => {
    if (!loaded || !user || tools === null) return;
    if (initialLoad.current) return;
    doSave("tools", tools, user.uid);
  }, [tools]);

  useEffect(() => {
    if (!loaded || !user || projects === null) return;
    if (initialLoad.current) return;
    doSave("projects", projects, user.uid);
  }, [projects]);

  // Merk at initial lasting er ferdig etter første render med data
  useEffect(() => {
    if (loaded) {
      // Vent én render-syklus før vi tillater auto-save
      const t = setTimeout(() => { initialLoad.current = false; }, 500);
      return () => clearTimeout(t);
    }
  }, [loaded]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }

  function handleLogin(u) {
    setUser(u);
  }

  function handleSignOut() {
    window._setStoredUser(null);
    if (window.google && window.google.accounts) {
      window.google.accounts.id.disableAutoSelect();
    }
    setUser(null);
    setLoaded(false);
    setYarns(null); setTools(null); setProjects(null);
  }

  // Sjekker lagret bruker
  if (user === undefined) {
    return (
      <div className="garnlager-root">
        <style>{GARNLAGER_CSS}</style>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh",
          flexDirection:"column", gap:12, color:"var(--walnut-soft)", fontFamily:"var(--font-body)" }}>
          <span style={{ fontSize:40 }}>🧶</span>
          <p style={{ margin:0 }}>Kobler til …</p>
        </div>
      </div>
    );
  }

  // Ikke innlogget
  if (!user) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  // Laster data
  if (!loaded) {
    return (
      <div className="garnlager-root">
        <style>{GARNLAGER_CSS}</style>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh",
          flexDirection:"column", gap:12, color:"var(--walnut-soft)", fontFamily:"var(--font-body)" }}>
          <span style={{ fontSize:40 }}>🧶</span>
          <p style={{ margin:0 }}>Laster garnlageret ditt …</p>
        </div>
      </div>
    );
  }

  const totalYarns = yarns.length;
  const totalWeight = yarns.reduce((sum, y) => sum + (Number(y.gjenvaerendeVekt) || 0), 0);
  const activeProjects = projects.filter(p => p.status === "Pågår").length;
  const finishedProjects = projects.filter(p => p.status === "Ferdig").length;

  return (
    <div className="garnlager-root">
      <style>{GARNLAGER_CSS}</style>
      <header className="app-header">
        <div className="header-inner">
          <div className="brand">
            <span className="brand-mark">Garnlager</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <div className="header-stats">
              <div><b>{totalYarns}</b>nøster</div>
              <div><b>{(totalWeight/1000).toFixed(1)} kg</b>igjen</div>
              <div><b>{activeProjects}</b>pågår</div>
              <div><b>{finishedProjects}</b>ferdige</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
              {saveStatus && (
                <span style={{
                  fontFamily:"var(--font-mono)", fontSize:11, padding:"4px 10px",
                  borderRadius:100, border:"1px solid var(--taupe-line)",
                  background: saveStatus === "feil" ? "#FEE" : "var(--cream-deep)",
                  color: saveStatus === "feil" ? "var(--terracotta)" : saveStatus === "lagret" ? "var(--moss)" : "var(--walnut-soft)"
                }}>
                  {saveStatus === "lagrer" ? "⏳ lagrer …" : saveStatus === "lagret" ? "✓ lagret" : "✗ lagringsfeil"}
                </span>
              )}
              {user.photoURL && <img src={user.photoURL} alt="" style={{ width:28, height:28, borderRadius:"50%", border:"1.5px solid var(--taupe-line)" }} />}
              <button className="btn btn-outline btn-sm" onClick={handleSignOut}>Logg ut</button>
            </div>
          </div>
        </div>
        <nav className="nav-tabs" aria-label="Hovednavigasjon">
          <TabButton active={tab === "garn"} onClick={() => setTab("garn")}>Garnlager</TabButton>
          <TabButton active={tab === "redskap"} onClick={() => setTab("redskap")}>Pinner &amp; redskap</TabButton>
          <TabButton active={tab === "prosjekter"} onClick={() => setTab("prosjekter")}>Prosjekter</TabButton>
          <TabButton active={tab === "kalkulator"} onClick={() => setTab("kalkulator")}>Kalkulator</TabButton>
          <TabButton active={tab === "strikkehandbok"} onClick={() => setTab("strikkehandbok")}>Strikkehåndbok</TabButton>
          <TabButton active={tab === "handbok"} onClick={() => setTab("handbok")}>Garnhåndbok</TabButton>
        </nav>
      </header>

      <main className="view">
        {tab === "garn" && <YarnView yarns={yarns} setYarns={setYarns} showToast={showToast} projects={projects} />}
        {tab === "redskap" && <ToolsView tools={tools} setTools={setTools} showToast={showToast} />}
        {tab === "prosjekter" && <ProjectsView projects={projects} setProjects={setProjects} yarns={yarns} setYarns={setYarns} showToast={showToast} />}
        {tab === "kalkulator" && <CalculatorView />}
        {tab === "strikkehandbok" && <QuickHandbookView />}
        {tab === "handbok" && <HandbookView />}
      </main>

      {toast && <div className="toast" role="status">{toast}</div>}
    </div>
  );
}

  return (

      {children}
    </button>
  );

/* ============================================================
   GARNLAGER — yarn inventory
   ============================================================ */

function emptyYarn() {
  return {
    id: uid(),
    navn: "",
    produsent: "",
    farge: "",
    fargekode: "#C9AF97",
    fibertype: "Ull",
    fibertypeDetalj: "",
    garngruppe: "C",
    lopelengdePer50g: "",
    totalVekt: "",
    gjenvaerendeVekt: "",
    antallNoster: "",
    notater: "",
    bilder: [],
  };
}

function YarnView({ yarns, setYarns, showToast, projects }) {
  const [search, setSearch] = useState("");
  const [filterGruppe, setFilterGruppe] = useState(null);
  const [filterFiber, setFilterFiber] = useState(null);
  const [editing, setEditing] = useState(null); // yarn object being edited, or null
  const [viewing, setViewing] = useState(null); // yarn being viewed in detail
  const [showAdd, setShowAdd] = useState(false);

  const filtered = yarns.filter((y) => {
    const matchesSearch =
      !search ||
      [y.navn, y.produsent, y.farge, y.fibertype, y.fibertypeDetalj, y.notater]
        .join(" ")
        .toLowerCase()
        .includes(search.toLowerCase());
    const matchesGruppe = !filterGruppe || y.garngruppe === filterGruppe;
    const matchesFiber = !filterFiber || y.fibertype === filterFiber;
    return matchesSearch && matchesGruppe && matchesFiber;
  });

  function handleSave(yarn) {
    setYarns((prev) => {
      const exists = prev.find((y) => y.id === yarn.id);
      if (exists) return prev.map((y) => (y.id === yarn.id ? yarn : y));
      return [yarn, ...prev];
    });
    setEditing(null);
    setShowAdd(false);
    setViewing(yarn);
    showToast("Garn lagret");
  }

  function handleDelete(id) {
    setYarns((prev) => prev.filter((y) => y.id !== id));
    setViewing(null);
    showToast("Garn fjernet fra lageret");
  }

  const usedFibers = [...new Set(yarns.map((y) => y.fibertype).filter(Boolean))];

  return (
    <div>
      <div className="view-header">
        <div>
          <h1 className="view-title">Garnlager</h1>
          <p className="view-desc">
            Hold oversikt over garnet ditt — fibertype, farge, mengde og bilder. Klikk på et nøste for å se detaljer, justere gjenværende mengde eller koble det til et prosjekt.
          </p>
        </div>
        <button className="btn" onClick={() => setShowAdd(true)}>+ Legg til garn</button>
      </div>

      <div className="toolbar">
        <input
          className="input search-input"
          type="search"
          placeholder="Søk på navn, produsent, farge, fiber…"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          aria-label="Søk i garnlager"
        />
      </div>

      <div className="toolbar">
        <div className="chip-group" role="group" aria-label="Filtrer på garngruppe">
          {Object.entries(GARNGRUPPER).map(([key, g]) => (
            <button
              key={key}
              className={`chip ${filterGruppe === key ? "active" : ""}`}
              onClick={() => setFilterGruppe(filterGruppe === key ? null : key)}
            >
              {key} · {g.navn}
            </button>
          ))}
        </div>
      </div>
      {usedFibers.length > 0 && (
        <div className="toolbar">
          <div className="chip-group" role="group" aria-label="Filtrer på fibertype">
            {usedFibers.map((f) => (
              <button
                key={f}
                className={`chip ${filterFiber === f ? "active" : ""}`}
                onClick={() => setFilterFiber(filterFiber === f ? null : f)}
              >
                {f}
              </button>
            ))}
          </div>
        </div>
      )}

      {filtered.length === 0 ? (
        <div className="empty">
          <span className="empty-icon">🧶</span>
          {yarns.length === 0 ? (
            <>
              <h3>Garnlageret er tomt</h3>
              <p>Legg til det første nøstet ditt for å starte oversikten. Du kan legge til bilder, fibertype, farge og hvor mye du har igjen.</p>
            </>
          ) : (
            <>
              <h3>Ingen treff</h3>
              <p>Ingen garn matcher søket eller filtrene dine. Prøv å justere eller nullstille filtrene.</p>
            </>
          )}
          <button className="btn" onClick={() => setShowAdd(true)}>+ Legg til garn</button>
        </div>
      ) : (
        <div className="grid">
          {filtered.map((y) => (
            <YarnCard key={y.id} yarn={y} onClick={() => setViewing(y)} />
          ))}
        </div>
      )}

      {(showAdd || editing) && (
        <YarnFormModal
          initial={editing || emptyYarn()}
          onSave={handleSave}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          isNew={!editing}
        />
      )}

      {viewing && (
        <YarnDetailModal
          yarn={viewing}
          projects={projects}
          onClose={() => setViewing(null)}
          onEdit={() => { setEditing(viewing); setViewing(null); }}
          onDelete={() => handleDelete(viewing.id)}
          onUpdate={(updated) => {
            setYarns((prev) => prev.map((y) => (y.id === updated.id ? updated : y)));
            setViewing(updated);
          }}
        />
      )}
    </div>
  );
}

function YarnCard({ yarn, onClick }) {

  const totalMeter =
    yarn.lopelengdePer50g && yarn.gjenvaerendeVekt
      ? Math.round((Number(yarn.lopelengdePer50g) / 50) * Number(yarn.gjenvaerendeVekt))
      : null;

  return (
    <div className="yarn-card" onClick={onClick} role="button" tabIndex={0}

        <img className="yarn-card-img" src={yarn.bilder[0]} alt={yarn.navn || "Garn"} />
      ) : (
        <div className="yarn-card-noimg">
          <span className="swatch" style={{ width: 36, height: 36, background: yarn.fargekode || "#C9AF97" }} />

        <h3 className="yarn-card-title">{yarn.navn || "Uten navn"}</h3>

            <span className="tag" style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span className="swatch" style={{ background: yarn.fargekode || "#C9AF97" }} /> {yarn.farge}

          <span>

          </span>
          {totalMeter !== null && <b>{totalMeter} m</b>}
        </div>
      </div>
    </div>
  );

/* ---------- Yarn form modal ---------- */
function YarnFormModal({ initial, onSave, onClose, isNew }) {
  const [form, setForm] = useState(initial);
  const fileInputRef = useRef(null);

  function update(field, value) {
    setForm((f) => ({ ...f, [field]: value }));
  }

  async function handleFiles(fileList) {
    const files = Array.from(fileList).slice(0, 6 - (form.bilder?.length || 0));
    const newImgs = [];
    for (const file of files) {
      const raw = await fileToDataUrl(file);
      const resized = await resizeImage(raw);
      newImgs.push(resized);
    }
    setForm((f) => ({ ...f, bilder: [...(f.bilder || []), ...newImgs] }));
  }

  function removeImage(idx) {
    setForm((f) => ({ ...f, bilder: f.bilder.filter((_, i) => i !== idx) }));
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.navn.trim()) return;
    onSave(form);
  }

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="yarn-modal-title">
        <div className="modal-header">
          <h2 id="yarn-modal-title">{isNew ? "Legg til garn" : "Rediger garn"}</h2>

function YarnDetailModal({ yarn, onClose, onEdit, onDelete, onUpdate, projects }) {
  const [activeImg, setActiveImg] = useState(0);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const gruppe = GARNGRUPPER[yarn.garngruppe];
  const totalMeter =
    yarn.lopelengdePer50g && yarn.gjenvaerendeVekt
      ? Math.round((Number(yarn.lopelengdePer50g) / 50) * Number(yarn.gjenvaerendeVekt))
      : null;

  const usedInProjects = projects.filter((p) => (p.garnIds || []).includes(yarn.id));

  function adjustWeight(delta) {
    const current = Number(yarn.gjenvaerendeVekt) || 0;
    const next = Math.max(0, current + delta);
    onUpdate({ ...yarn, gjenvaerendeVekt: next });

function emptyTool() {
  return {
    id: uid(),
    type: "Rundpinner",
    storrelse: "4",
    lengde: "60 cm",
    merke: "",
    antall: 1,

function ToolsView({ tools, setTools, showToast }) {
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [filterType, setFilterType] = useState(null);

  function handleSave(tool) {
    setTools((prev) => {
      const exists = prev.find((t) => t.id === tool.id);
      if (exists) return prev.map((t) => (t.id === tool.id ? tool : t));
      return [...prev, tool];
    });
    setEditing(null);
    setShowAdd(false);
    showToast("Redskap lagret");
  }

  function handleDelete(id) {
    setTools((prev) => prev.filter((t) => t.id !== id));
    showToast("Redskap fjernet");
  }

  const filtered = tools.filter((t) => !filterType || t.type === filterType);

  // sort by type, then by numeric size
  const sorted = [...filtered].sort((a, b) => {
    if (a.type !== b.type) return a.type.localeCompare(b.type);
    return parseFloat(a.storrelse) - parseFloat(b.storrelse);
  });

  return (
    <div>
      <div className="view-header">
        <div>
          <h1 className="view-title">Pinner &amp; redskap</h1>
          <p className="view-desc">
            Oversikt over strikkepinner, heklepinner og annet tilbehør du har — størrelser, lengder og antall. Sammenlign med pinneanbefalinger i håndboken når du planlegger et prosjekt.
          </p>
        </div>
        <button className="btn" onClick={() => setShowAdd(true)}>+ Legg til redskap</button>
      </div>

      <div className="toolbar">
        <div className="chip-group" role="group" aria-label="Filtrer på type">
          {NEEDLE_TYPES.map((t) => (
            <button key={t} className={`chip ${filterType === t ? "active" : ""}`} onClick={() => setFilterType(filterType === t ? null : t)}>
              {t}
            </button>
          ))}
        </div>
      </div>

      {sorted.length === 0 ? (
        <div className="empty">
          <span className="empty-icon">🪡</span>
          <h3>Ingen redskap registrert</h3>
          <p>Legg inn strikkepinner, heklepinner, rundpinner og strømpepinnesett med størrelse og lengde, så har du full oversikt neste gang du skal sette i gang med et prosjekt.</p>
          <button className="btn" onClick={() => setShowAdd(true)}>+ Legg til redskap</button>
        </div>
      ) : (
        <table className="tool-table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Størrelse</th>
              <th>Lengde</th>
              <th>Merke</th>
              <th>Antall</th>
              <th>Notater</th>
              <th aria-label="Handlinger"></th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((t) => (
              <tr key={t.id}>
                <td>{t.type}</td>
                <td>{t.storrelse} mm</td>
                <td>{t.lengde || "—"}</td>
                <td>{t.merke || "—"}</td>
                <td>{t.antall}</td>
                <td style={{ color: "var(--walnut-soft)" }}>{t.notater || "—"}</td>
                <td style={{ whiteSpace: "nowrap" }}>
                  <button className="btn btn-outline btn-sm" onClick={() => setEditing(t)}>Rediger</button>{" "}
                  <button className="btn btn-danger btn-sm" onClick={() => handleDelete(t.id)}>Slett</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {(showAdd || editing) && (
        <ToolFormModal
          initial={editing || emptyTool()}
          onSave={handleSave}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          isNew={!editing}
        />
      )}
    </div>
  );
}

                <textarea id="tool-notater" className="input" value={form.notater} onChange={(e) => update("notater", e.target.value)} placeholder="f.eks. Lett bøyelig, savnet endestopper" />
              </div>

          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-outline" onClick={onClose}>Avbryt</button>

/* ============================================================
   PROSJEKTER — project tracker
   ============================================================ */

function emptyProject() {
  return {
    id: uid(),
    navn: "",
    type: "",
    status: "Planlagt",
    oppskrift: "",
    pinneStorrelse: "",
    garnBruk: {},   // { yarnId: gramsUsed }
    garnIds: [],    // kept for backwards compat, derived from garnBruk
    startdato: "",
    sluttdato: "",
    notater: "",
    bilder: [],
  };
}

function ProjectsView({ projects, setProjects, yarns, setYarns, showToast }) {
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [viewing, setViewing] = useState(null);
  const [filterStatus, setFilterStatus] = useState(null);

  function handleSave(project, prevProject) {
    // Sync garnIds from garnBruk keys for backwards compat
    const garnBruk = project.garnBruk || {};
    const updatedProject = {
      ...project,
      garnIds: Object.keys(garnBruk).filter(id => (Number(garnBruk[id]) || 0) > 0 || garnBruk[id] === "linked"),
    };

    // Apply gram deductions: compare old garnBruk vs new garnBruk
    const prevBruk = (prevProject && prevProject.garnBruk) || {};
    setYarns(prev => prev.map(yarn => {
      const prevGrams = Number(prevBruk[yarn.id]) || 0;
      const newGrams = Number(garnBruk[yarn.id]) || 0;
      const diff = newGrams - prevGrams;
      if (diff === 0) return yarn;
      const current = Number(yarn.gjenvaerendeVekt) || 0;
      return { ...yarn, gjenvaerendeVekt: Math.max(0, current - diff) };
    }));

    setProjects((prev) => {
      const exists = prev.find((p) => p.id === updatedProject.id);
      if (exists) return prev.map((p) => (p.id === updatedProject.id ? updatedProject : p));
      return [updatedProject, ...prev];
    });
    setEditing(null);
    setShowAdd(false);
    setViewing(updatedProject);
    showToast("Prosjekt lagret — garnlager oppdatert");
  }

  function handleDelete(id) {
    setProjects((prev) => prev.filter((p) => p.id !== id));
    setViewing(null);
    showToast("Prosjekt fjernet");
  }

  const filtered = projects.filter((p) => !filterStatus || p.status === filterStatus);

  // Sort: Pågår first, then Planlagt/Idé, then Ferdig, then Lagt på vent
  const order = { "Pågår": 0, "Idé": 1, "Planlagt": 1, "Lagt på vent": 2, "Ferdig": 3 };
  const sorted = [...filtered].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  function statusClass(status) {
    if (status === "Ferdig") return "ferdig";
    if (status === "Pågår") return "pagaar";
    return "planlagt";
  }

  return (
    <div>
      <div className="view-header">
        <div>
          <h1 className="view-title">Prosjekter</h1>
          <p className="view-desc">
            Hold rede på hva du strikker eller hekler nå, hva du planlegger, og hva du har fullført. Koble prosjekter til garnet du bruker for å se hvilket garn som er i bruk.
          </p>
        </div>
        <button className="btn" onClick={() => setShowAdd(true)}>+ Nytt prosjekt</button>
      </div>

      <div className="toolbar">
        <div className="chip-group" role="group" aria-label="Filtrer på status">
          {PROSJEKT_STATUS.map((s) => (
            <button key={s} className={`chip ${filterStatus === s ? "active" : ""}`} onClick={() => setFilterStatus(filterStatus === s ? null : s)}>
              {s}
            </button>
          ))}
        </div>
      </div>

      {sorted.length === 0 ? (
        <div className="empty">
          <span className="empty-icon">🧣</span>
          {projects.length === 0 ? (
            <>
              <h3>Ingen prosjekter ennå</h3>
              <p>Legg til prosjektet du jobber med — koble det til garn fra lageret, og oppdater status fra idé til ferdig.</p>
            </>
          ) : (
            <>
              <h3>Ingen treff</h3>
              <p>Ingen prosjekter med denne statusen. Prøv et annet filter.</p>
            </>
          )}
          <button className="btn" onClick={() => setShowAdd(true)}>+ Nytt prosjekt</button>
        </div>
      ) : (
        <div>
          {sorted.map((p) => {
            const linkedYarns = yarns.filter((y) => {
              const ids = p.garnIds || Object.keys(p.garnBruk || {});
              return ids.includes(y.id);
            });
            return (
              <div className="project-card" key={p.id} onClick={() => setViewing(p)} role="button" tabIndex={0}
                onKeyDown={(e) => { if (e.key === "Enter") setViewing(p); }}>
                {p.bilder && p.bilder.length > 0 ? (
                  <img className="project-img" src={p.bilder[0]} alt={p.navn} />
                ) : (
                  <div className="project-img" style={{ display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🧶</div>
                )}
                <div className="project-info">
                  <h3 className="project-title">{p.navn || "Uten navn"}</h3>
                  <div className="project-meta">
                    {p.type && <>{p.type} · </>}
                    {linkedYarns.length > 0 ? `${linkedYarns.length} garn koblet` : "Ingen garn koblet"}
                    {p.pinneStorrelse && ` · pinne ${p.pinneStorrelse} mm`}
                  </div>
                  {p.notater && <div style={{ fontSize: 12.5, color: "var(--walnut-soft)" }}>{p.notater.slice(0, 100)}{p.notater.length > 100 ? "…" : ""}</div>}
                </div>
                <span className={`status-badge ${statusClass(p.status)}`}>{p.status}</span>
              </div>
            );
          })}
        </div>
      )}

      {(showAdd || editing) && (
        <ProjectFormModal
          initial={editing || emptyProject()}
          prevProject={editing}
          yarns={yarns}
          onSave={handleSave}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          isNew={!editing}
        />
      )}

      {viewing && (
        <ProjectDetailModal
          project={viewing}
          yarns={yarns}
          onClose={() => setViewing(null)}
          onEdit={() => { setEditing(viewing); setViewing(null); }}
          onDelete={() => handleDelete(viewing.id)}
        />
      )}
    </div>
  );
}

function ProjectFormModal({ initial, prevProject, yarns, onSave, onClose, isNew }) {
  const [form, setForm] = useState(() => ({
    ...initial,
    garnBruk: initial.garnBruk || {},
  }));
  const fileInputRef = useRef(null);

  function update(field, value) {
    setForm((f) => ({ ...f, [field]: value }));
  }

  function toggleYarnLink(id) {
    setForm((f) => {
      const bruk = { ...f.garnBruk };
      if (id in bruk) {
        delete bruk[id];
      } else {
        bruk[id] = "";
      }
      return { ...f, garnBruk: bruk };
    });
  }

  function setGrams(id, val) {
    setForm((f) => ({ ...f, garnBruk: { ...f.garnBruk, [id]: val } }));
  }

  async function handleFiles(fileList) {
    const files = Array.from(fileList).slice(0, 6 - (form.bilder?.length || 0));
    const newImgs = [];
    for (const file of files) {
      const raw = await fileToDataUrl(file);
      const resized = await resizeImage(raw);
      newImgs.push(resized);
    }
    setForm((f) => ({ ...f, bilder: [...(f.bilder || []), ...newImgs] }));
  }

  function removeImage(idx) {
    setForm((f) => ({ ...f, bilder: f.bilder.filter((_, i) => i !== idx) }));
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.navn.trim()) return;
    onSave(form, prevProject);
  }

  const linkedYarnIds = Object.keys(form.garnBruk || {});

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
        <div className="modal-header">
          <h2 id="project-modal-title">{isNew ? "Nytt prosjekt" : "Rediger prosjekt"}</h2>
          <button className="modal-close" onClick={onClose} aria-label="Lukk">×</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-row">
              <div className="form-field" style={{ flex: 2 }}>
                <label htmlFor="pnavn">Navn på prosjekt *</label>
                <input id="pnavn" className="input" value={form.navn} onChange={(e) => update("navn", e.target.value)} placeholder="f.eks. Cabled vrangbord-jakke" required />
              </div>
              <div className="form-field">
                <label htmlFor="ptype">Type</label>
                <input id="ptype" className="input" value={form.type} onChange={(e) => update("type", e.target.value)} placeholder="f.eks. Sjal, sokker, genser" />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label htmlFor="pstatus">Status</label>
                <select id="pstatus" className="select" value={form.status} onChange={(e) => update("status", e.target.value)}>
                  {PROSJEKT_STATUS.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-field">
                <label htmlFor="ppinne">Pinnestørrelse (mm)</label>
                <input id="ppinne" className="input" value={form.pinneStorrelse} onChange={(e) => update("pinneStorrelse", e.target.value)} placeholder="f.eks. 4" />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label htmlFor="poppskrift">Oppskrift / kilde</label>
                <input id="poppskrift" className="input" value={form.oppskrift} onChange={(e) => update("oppskrift", e.target.value)} placeholder="f.eks. Drops design 12345, eller eget design" />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label htmlFor="pstart">Startet</label>
                <input id="pstart" className="input" type="date" value={form.startdato} onChange={(e) => update("startdato", e.target.value)} />
              </div>
              <div className="form-field">
                <label htmlFor="pferdig">Ferdig</label>
                <input id="pferdig" className="input" type="date" value={form.sluttdato} onChange={(e) => update("sluttdato", e.target.value)} />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label>Garn brukt i prosjektet</label>
                {yarns.length === 0 ? (
                  <p style={{ fontSize: 12.5, color: "var(--walnut-soft)", margin: 0 }}>Du har ikke lagt inn garn i lageret ennå.</p>
                ) : (
                  <div>
                    <p style={{ fontSize: 12, color: "var(--walnut-soft)", margin: "0 0 10px 0" }}>
                      Trykk for å koble garn til prosjektet. Fyll inn gram brukt så trekkes det automatisk fra garnlageret når du lagrer.
                    </p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {yarns.map((y) => {
                        const linked = y.id in (form.garnBruk || {});
                        const grams = form.garnBruk?.[y.id] ?? "";
                        return (
                          <div key={y.id} style={{ display: "flex", alignItems: "center", gap: 10, background: linked ? "var(--cream)" : "transparent", borderRadius: 8, padding: linked ? "8px 12px" : "4px 0", border: linked ? "1.5px solid var(--taupe-line)" : "none", transition: "all 0.15s" }}>
                            <button
                              type="button"

                              {y.gjenvaerendeVekt ? <span style={{ fontSize: 11, color: "var(--walnut-soft)" }}>({y.gjenvaerendeVekt} g igjen)</span> : null}
                            </button>
                            {linked && (
                              <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                                <input
                                  className="input"
                                  type="number"
                                  min="0"
                                  style={{ width: 80, padding: "6px 10px", fontSize: 13 }}
                                  placeholder="gram"
                                  value={grams}
                                  onChange={(e) => setGrams(y.id, e.target.value)}
                                />
                                <span style={{ fontSize: 12, color: "var(--walnut-soft)", whiteSpace: "nowrap" }}>g brukt</span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label htmlFor="pnotater">Notater</label>
                <textarea id="pnotater" className="input" value={form.notater} onChange={(e) => update("notater", e.target.value)} placeholder="Fremgang, justeringer, ting å huske på…" />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label>Bilder av prosjektet</label>
                <div className="image-upload" onClick={() => fileInputRef.current?.click()}>
                  📷 Trykk for å laste opp bilde(r) — maks 6
                </div>
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/*"
                  multiple
                  className="visually-hidden"
                  onChange={(e) => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ""; }}
                />
                {form.bilder && form.bilder.length > 0 && (
                  <div className="image-preview-row">
                    {form.bilder.map((src, i) => (
                      <div className="image-preview-wrap" key={i}>
                        <img className="image-preview" src={src} alt={`Bilde ${i + 1}`} />
                        <button type="button" className="image-preview-remove" onClick={() => removeImage(i)} aria-label="Fjern bilde">×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-outline" onClick={onClose}>Avbryt</button>
            <button type="submit" className="btn">Lagre prosjekt</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function CalculatorView() {
  return (
    <div>
      <div className="view-header">

          <h1 className="view-title">Kalkulator</h1>
          <p className="view-desc">
            Regnehjelp for å bytte ut garn i en oppskrift, kombinere flere tråder, skalere maskeantall etter strikkefasthet, og finne riktig maskeantall fra egne mål.
          </p>
        </div>

      <YarnSubstitutionCalc />

/* ---- 1. Bytte garn: meter mot meter ---- */
function YarnSubstitutionCalc() {
  const [oppskriftVekt, setOppskriftVekt] = useState("50");
  const [oppskriftMeter, setOppskriftMeter] = useState("170");
  const [oppskriftNoster, setOppskriftNoster] = useState("6");
  const [nyttVekt, setNyttVekt] = useState("50");
  const [nyttMeter, setNyttMeter] = useState("150");

  const totalMeterOppskrift = (Number(oppskriftMeter) / Number(oppskriftVekt || 1)) * Number(oppskriftVekt) * Number(oppskriftNoster);
  // simplifies to oppskriftMeter * oppskriftNoster, but keep formula explicit per handbook style
  const totalMeter = Number(oppskriftMeter) * Number(oppskriftNoster);
  const nyeNosterRaw = nyttMeter ? totalMeter / Number(nyttMeter) : 0;
  const nyeNosterAvrundet = Math.ceil(nyeNosterRaw);

  const valid = oppskriftMeter && oppskriftNoster && nyttMeter && Number(nyttMeter) > 0;

  return (
    <div className="calc-card">
      <h3>Bytte garn — meter mot meter</h3>
      <p className="calc-desc">
        Oppskriften ber om et bestemt antall nøster av et garn, men du har et annet garn med en annen løpelengde. Regn ut hvor mange nøster av <i>ditt</i> garn du trenger for å få like mange meter totalt.
      </p>
      <div className="form-row">
        <div className="form-field">
          <label>Oppskriftens garn: m / 50 g</label>
          <input className="input" type="number" min="0" value={oppskriftMeter} onChange={(e) => setOppskriftMeter(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Antall nøster i oppskriften</label>
          <input className="input" type="number" min="0" value={oppskriftNoster} onChange={(e) => setOppskriftNoster(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Ditt garn: m / 50 g</label>
          <input className="input" type="number" min="0" value={nyttMeter} onChange={(e) => setNyttMeter(e.target.value)} />
        </div>
      </div>
      {valid && (
        <div className="calc-result">
          Oppskriften krever totalt <b>{totalMeter}</b> meter garn.<br />
          <div style={{ marginTop: 8 }}>
            <span className="big">{nyeNosterAvrundet}</span> nøster av ditt garn (50 g = {nyttMeter} m)
          </div>
          <div style={{ marginTop: 4, fontSize: 12, color: "var(--walnut-soft)" }}>
            ({totalMeter} m ÷ {nyttMeter} m = {nyeNosterRaw.toFixed(2)} → rundes opp til {nyeNosterAvrundet})
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- 2. Skalere strikkefasthet/maskeantall ---- */
function GaugeScaleCalc() {
  const [oppskriftFasthet, setOppskriftFasthet] = useState("20");
  const [dinFasthet, setDinFasthet] = useState("22");
  const [maskeantall, setMaskeantall] = useState("120");
  const [omganger, setOmganger] = useState("60");

  const fastOpp = Number(oppskriftFasthet);
  const fastDin = Number(dinFasthet);
  const skalafaktor = fastOpp > 0 ? fastDin / fastOpp : 0;
  const nyeMasker = maskeantall ? Math.round(skalafaktor * Number(maskeantall)) : null;
  const nyeOmganger = omganger ? Math.round(skalafaktor * Number(omganger)) : null;

  const valid = fastOpp > 0 && fastDin > 0;

  return (
    <div className="calc-card">
      <h3>Skalere maskeantall etter strikkefasthet</h3>
      <p className="calc-desc">
        Hvis din strikkefasthet (masker per 10 cm) avviker fra oppskriftens, kan du regne ut skalafaktoren og bruke den til å justere antall masker eller omganger i oppskriften.
      </p>
      <div className="form-row">
        <div className="form-field">
          <label>Oppskriftens strikkefasthet (m/10 cm)</label>
          <input className="input" type="number" min="0" value={oppskriftFasthet} onChange={(e) => setOppskriftFasthet(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Din strikkefasthet (m/10 cm)</label>
          <input className="input" type="number" min="0" value={dinFasthet} onChange={(e) => setDinFasthet(e.target.value)} />
        </div>
      </div>
      <div className="form-row">
        <div className="form-field">
          <label>Maskeantall i oppskriften (valgfritt)</label>
          <input className="input" type="number" min="0" value={maskeantall} onChange={(e) => setMaskeantall(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Antall omganger i oppskriften (valgfritt)</label>
          <input className="input" type="number" min="0" value={omganger} onChange={(e) => setOmganger(e.target.value)} />
        </div>
      </div>
      {valid && (
        <div className="calc-result">
          Skalafaktor: <b className="big" style={{ fontSize: 20 }}>{skalafaktor.toFixed(2)}</b>
          <div style={{ marginTop: 8, display: "flex", gap: 24, flexWrap: "wrap" }}>
            {nyeMasker !== null && (
              <div>
                <div style={{ fontSize: 11, textTransform: "uppercase", color: "var(--walnut-soft)", letterSpacing: "0.05em" }}>Nytt maskeantall</div>
                <div className="big">{nyeMasker}</div>
              </div>
            )}
            {nyeOmganger !== null && (
              <div>
                <div style={{ fontSize: 11, textTransform: "uppercase", color: "var(--walnut-soft)", letterSpacing: "0.05em" }}>Nye omganger</div>
                <div className="big">{nyeOmganger}</div>
              </div>
            )}
          </div>
          <div style={{ marginTop: 8, fontSize: 12, color: "var(--walnut-soft)" }}>
            Husk: justering opp til ~10% kan du ofte ta med pinnestørrelse i stedet. Større avvik krever skalering av maskeantallet — og om mønsteret har en rapport, må sluttresultatet være delelig med rapportens maskeantall.
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- 3. Finn maskeantall fra mål og garn ---- */
function BodyMeasureCalc() {
  const [omkrets, setOmkrets] = useState("100");
  const [bevegelse, setBevegelse] = useState("8");
  const [fasthet, setFasthet] = useState("18");
  const [rapport, setRapport] = useState("");

  const totalOmkrets = Number(omkrets) + Number(bevegelse || 0);
  const masker = fasthet ? (Number(fasthet) * totalOmkrets) / 10 : 0;
  const maskerAvrundet = Math.round(masker);
  let maskerJustert = maskerAvrundet;
  if (rapport && Number(rapport) > 0) {
    const rap = Number(rapport);
    maskerJustert = Math.round(maskerAvrundet / rap) * rap;
  }

  const valid = omkrets && fasthet;

  return (
    <div className="calc-card">
      <h3>Finn maskeantall fra mål</h3>
      <p className="calc-desc">
        Mål kroppen (f.eks. brystvidde eller hofteomkrets), legg til bevegelsesvidde (5–10 cm er vanlig), og finn hvor mange masker du må legge opp basert på din strikkefasthet. Hvis mønsteret ditt har en rapport, kan du runde av til nærmeste multiplum.
      </p>
      <div className="form-row">
        <div className="form-field">
          <label>Kroppsmål (cm)</label>
          <input className="input" type="number" min="0" value={omkrets} onChange={(e) => setOmkrets(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Bevegelsesvidde (cm)</label>
          <input className="input" type="number" min="0" value={bevegelse} onChange={(e) => setBevegelse(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Din strikkefasthet (m/10 cm)</label>
          <input className="input" type="number" min="0" value={fasthet} onChange={(e) => setFasthet(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Mønsterrapport (masker, valgfritt)</label>
          <input className="input" type="number" min="0" value={rapport} onChange={(e) => setRapport(e.target.value)} />
        </div>
      </div>
      {valid && (
        <div className="calc-result">
          Totalt mål inkl. bevegelsesvidde: <b>{totalOmkrets} cm</b>
          <div style={{ marginTop: 8 }}>
            <span className="big">{maskerAvrundet}</span> masker
            {rapport && Number(rapport) > 0 && maskerJustert !== maskerAvrundet && (
              <> → justert til <b className="big" style={{ fontSize: 20 }}>{maskerJustert}</b> masker for å passe rapporten på {rapport}</>
            )}
          </div>
          <div style={{ marginTop: 4, fontSize: 12, color: "var(--walnut-soft)" }}>
            ({fasthet} m/10 cm × {totalOmkrets} cm ÷ 10 = {masker.toFixed(1)})
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- 4. Kombinere flere tråder ---- */
function CombineThreadsCalc() {
  const garngruppeOptions = Object.entries(GARNGRUPPER);
  const [trad1Gruppe, setTrad1Gruppe] = useState("A");
  const [antallTrader, setAntallTrader] = useState("2");

  // approximate mapping based on handbook: combining N threads of group X gives roughly group at index+steps
  const groupOrder = ["A", "AB", "B", "C", "D", "E", "F"];
  const stepsForThreads = { "2": 2, "3": 3, "4": 4, "8": 5 }; // rough heuristic; A+A=C (2 steps), A 3x = D, etc.

  const startIdx = groupOrder.indexOf(trad1Gruppe);
  const steps = stepsForThreads[antallTrader] || 2;
  const resultIdx = Math.min(groupOrder.length - 1, startIdx + Math.round(steps * 0.6));
  const resultGroup = groupOrder[resultIdx];

  return (
    <div className="calc-card">
      <h3>Kombinere flere tråder</h3>
      <p className="calc-desc">
        Strikker du med flere tråder samtidig (holde to eller flere nøster sammen), blir resultatet en tykkere "garngruppe". Dette er en grov pekepinn — test alltid med en prøvelapp, siden resultatet varierer med fibertype og spinning.
      </p>
      <div className="form-row">
        <div className="form-field">
          <label>Garngruppe du starter med</label>
          <select className="select" value={trad1Gruppe} onChange={(e) => setTrad1Gruppe(e.target.value)}>
            {garngruppeOptions.map(([k, g]) => <option key={k} value={k}>{k} — {g.navn}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label>Antall tråder holdt sammen</label>
          <select className="select" value={antallTrader} onChange={(e) => setAntallTrader(e.target.value)}>
            <option value="2">2 tråder</option>
            <option value="3">3 tråder</option>
            <option value="4">4 tråder</option>
            <option value="8">8 tråder</option>
          </select>
        </div>
      </div>
      <div className="calc-result">
        {antallTrader} tråder av garngruppe <b>{trad1Gruppe}</b> gir omtrent garngruppe{" "}
        <span className="big">{resultGroup}</span> ({GARNGRUPPER[resultGroup].navn})
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--walnut-soft)" }}>
          Tommelfingerregler fra håndboken: 2 tråder A = 1 tråd C · 3 tråder A = 1 tråd D · 4 tråder A = 1 tråd E · 8 tråder A = 1 tråd F · 2 tråder B = 1 tråd D · 2 tråder C = 1 tråd E · 4 tråder C = 1 tråd F · 2 tråder E = 1 tråd F.
        </div>
      </div>
    </div>
  );
}

          </section>

          <section id="garngrupper" ref={(el) => (refs.current["garngrupper"] = el)}>
            <h2>📏 Garngrupper og pinnestørrelser</h2>
            <p>
              Garn deles inn i garngrupper etter tykkelse. Garn i samme garngruppe skal ha lik strikkefasthet, men løpelengden (meter per 50 g) kan variere fra garntype til garntype innad i samme gruppe — du kan derfor ikke regne med at 50 g av ett nøste i en gruppe tilsvarer 50 g av et annet nøste i samme gruppe.
            </p>
            <table className="htable">
              <thead>
                <tr><th>Gruppe</th><th>Navn</th><th>Strikkefasthet (m/10cm)</th><th>Meter pr. 50 g</th><th>Strikkepinne</th><th>Heklenål</th></tr>
              </thead>
              <tbody>
                {Object.entries(GARNGRUPPER).map(([k, g]) => (
                  <tr key={k}>
                    <td><span className={`tag group-${k}`}>{k}</span></td>
                    <td>{g.navn}</td>
                    <td>{g.strikkefasthet}</td>
                    <td>{g.meter}</td>
                    <td>{g.pinneStrikk}</td>
                    <td>{g.pinneHekle}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <p>
              Anbefalt pinnestørrelse varierer selv om garnet er i lik garngruppe. Det er derfor viktig å teste strikkefastheten på en prøvelapp — det er ikke siste gang du vil høre dette i denne håndboken!
            </p>

            <h3>WPI-metoden (Wraps Per Inch)</h3>
            <p>
              Vikle garnet jevnt rundt en linjal i én rad uten å stramme. Tell hvor mange ganger garnet får rundt per tomme (2,54 cm). Dette kan gi en indikasjon på garnvekten:
            </p>
            <table className="htable">
              <thead><tr><th>Garngruppe</th><th>WPI</th></tr></thead>
              <tbody>
                <tr><td>Lace</td><td>30+ WPI</td></tr>
                <tr><td>Fingering</td><td>19–22 WPI</td></tr>
                <tr><td>Sport</td><td>15–18 WPI</td></tr>
                <tr><td>DK</td><td>12–14 WPI</td></tr>
                <tr><td>Worsted</td><td>9–11 WPI</td></tr>
                <tr><td>Bulky</td><td>6–8 WPI</td></tr>
              </tbody>
            </table>

            <h3>Kombinere garngrupper med flere tråder</h3>
            <p>Ut fra strikkefastheten kan man kombinere flere tråder fra ulike garngrupper for å oppnå samme tykkelse som en tykkere garngruppe:</p>
            <table className="htable">
              <thead><tr><th>Kombinasjon</th><th>Tilsvarer</th></tr></thead>
              <tbody>
                <tr><td>Garngruppe A: 2 tråder</td><td>1 tråd i garngruppe C</td></tr>
                <tr><td>Garngruppe A: 3 tråder</td><td>1 tråd i garngruppe D</td></tr>
                <tr><td>Garngruppe A: 4 tråder</td><td>1 tråd i garngruppe E</td></tr>
                <tr><td>Garngruppe A: 8 tråder</td><td>1 tråd i garngruppe F</td></tr>
                <tr><td>Garngruppe B: 2 tråder</td><td>1 tråd i garngruppe D</td></tr>
                <tr><td>Garngruppe C: 2 tråder</td><td>1 tråd i garngruppe E</td></tr>
                <tr><td>Garngruppe C: 4 tråder</td><td>1 tråd i garngruppe F</td></tr>
                <tr><td>Garngruppe E: 2 tråder</td><td>1 tråd i garngruppe F</td></tr>
              </tbody>
            </table>
            <p style={{ fontFamily: "var(--font-mono)", fontSize: 13, textAlign: "center" }}>I DROPS sine oppskrifter skrives dette f.eks. slik: A + A = C</p>
          </section>

          <section id="farge" ref={(el) => (refs.current["farge"] = el)}>
            <h2>🎨 Farge og fargelære</h2>
            <h3>Sortere etter farge</h3>
            <p>
              Farger som går ton-i-ton er ofte enkle å kombinere for å få et delikat og rolig uttrykk. Man kan også leke seg med kontraster for å skape mer spennende og lekne mønstre. For et harmonisk uttrykk kan det være greit å holde seg til tre farger — en grunnfarge og inntil tre mønsterfarger.
            </p>
            <p>
              Et tips er å sortere varme og kalde farger hver for seg, og bruke farger i lik temperaturskala i prosjektene dine. Tenk også på mengdemetning — altså hvor fargesterk fargen er. Å bruke en dus rosatone sammen med en "hot pink" kan gjøre at den duse rosafargen forsvinner i det totale uttrykket, men det kan også skape en stilig effekt. Hvis man bruker komplementærfarger (kontrastfarger) vil plagget få et spennende og livlig uttrykk.
            </p>

            <h3>Ittens fargesirkel</h3>
            <p>
              Ittens fargesirkel viser de ulike komplementærfargene med de tre grunnfargene gul, rød og blå som utgangspunkt. Komplementærfarger skaper store kontraster, mens nabofarger skaper mer harmoni.
            </p>

            <h3>Kulør, metning og valør</h3>
            <p>
              <b>Kulør</b> er hvilken farge det er snakk om (blå, gul, oransje). <b>Metning</b> er hvor fargesterk fargen er — ytterst er fargen mest fargesterk og inneholder lite sort eller hvitt, mens innerst er fargen tilsatt sort eller hvitt, som gjør fargen mer dempet. <b>Valør</b> forteller hvor på skalaen fargen hører hjemme, fra mørk til lys. Farger som er i samme rad vertikalt eller horisontalt vil harmonere med hverandre.
            </p>

            <h3>Praktiske kombinasjoner</h3>
            <p>
              Komplementærfarger (kontrastfarger), varme/kalde kombinasjoner, og høy/lav metning eller valør er alle måter å bevisst styre uttrykket på et prosjekt. Tips: prøv å legge garnnøstene dine fysisk side om side i ulikt dagslys før du bestemmer deg — fargeoppfatningen endrer seg mye med lyset.
            </p>
          </section>

          <section id="organisering" ref={(el) => (refs.current["organisering"] = el)}>
            <h2>📦 Organisere restegarn</h2>
            <p>
              Før du kan sette i gang med et restegarnprosjekt er det lurt å få en oversikt over hva du faktisk har. Måter man kan gjøre det på er å enten sortere etter garnvekt, fibertype (ull, lin, bomull, akryl og liknende) eller farger som harmonerer med hverandre — som denne appen hjelper deg med.
            </p>

            <h3>Banderollen / merkelappen mangler</h3>
            <p>
              Det er ikke sjeldent at banderollen mangler. Ofte forsvinner den når man har tatt litt av nøstet, eller hvis man har rukket opp og surret opp garnet igjen. Da er det verken lett å finne ut hva slags type garn man har eller hvilken strikkefasthet som er riktig.
            </p>

            <h3>Veie opp garnet</h3>
            <p>
              Du kan veie opp garnet for hånd ved å måle opp noen meter og se hva det veier. Dette kan gi deg en indikasjon på hvilken garngruppe garnet tilhører. Noen eksempler på garntyper:
            </p>
            <table className="htable">
              <thead><tr><th>Eksempel</th><th>Garntype</th><th>Garngruppe</th><th>Løpelengde</th></tr></thead>
              <tbody>
                <tr><td>A</td><td>Drops Lace</td><td><span className="tag group-A">A · Lace</span></td><td>50 g = 400 m</td></tr>
                <tr><td>B</td><td>Filcolana Arwetta</td><td><span className="tag group-AB">AB · Fingering</span></td><td>50 g = 210 m</td></tr>
                <tr><td>C</td><td>Sandnes Duo</td><td><span className="tag group-B">B · Sport</span></td><td>50 g = 124 m</td></tr>
                <tr><td>D</td><td>Sandnes Merino Ull</td><td><span className="tag group-C">C · DK</span></td><td>50 g = 105 m</td></tr>
                <tr><td>E</td><td>Drops Nepal</td><td><span className="tag group-D">D · Worsted</span></td><td>50 g = 82 m</td></tr>
                <tr><td>F</td><td>Rowan Big Wool</td><td><span className="tag group-F">F · Super bulky</span></td><td>50 g = 40 m</td></tr>
              </tbody>
            </table>
            <p>
              Bokstavene her tilsvarer en garngruppe — garn i samme garngruppe skal ha lik strikkefasthet, men løpelengden kan variere fra garntype til garntype, så du kan ikke regne med at 50 g av ett nøste tilsvarer 50 g av et annet nøste i samme gruppe.
            </p>
          </section>

          <section id="mengde" ref={(el) => (refs.current["mengde"] = el)}>
            <h2>🧮 Beregne mengde garn</h2>
            <p>
              Når du har funnet et prosjekt du vil bruke restegarn til, men garnet ditt ikke samsvarer med oppskriften (annen strikkefasthet, annen løpelengde per 50 g, eller annen pinne enn anbefalt) — bruk Kalkulator-fanen til å regne ut nøyaktig hvor mye garn du trenger. Tre eksempler fra håndboken viser prinsippet:
            </p>

            <h3>Eksempel 1 — tråd mot tråd</h3>
            <p>
              Oppskriften sier garn på 50 g = 170 meter, og det benyttes 6 nøster. Du har garn hvor 50 g = 150 m. Totalt antall meter i oppskriften er 6 × 170 = 1020 meter. Del dette på meter per 50 g for ditt garn:
            </p>
            <p style={{ fontFamily: "var(--font-mono)", textAlign: "center" }}>1020 ÷ 150 = 6,8 → du trenger 7 nøster av ditt garn (50 g = 150 m).</p>

            <h3>Eksempel 2 — 1 tråd mot 2 tråder</h3>
            <p>
              Oppskriften sier totalt 1150 g garn, hvor opprinnelig garn er 50 g = 50 meter. Det gir 1150 ÷ 50 = 23 nøster. Hvis ditt nye garn er 50 g = 150 meter, gir 1150 ÷ 150 = 7,67 — du behøver i dette tilfellet kun 8 nøster i stedet for 23.
            </p>

            <h3>Eksempel 3 — to tråder med ulik løpelengde til én</h3>
            <p>
              Oppskriften sier 300 g av garn X (50 g = 167 m) + 125 g av garn Y (50 g = 400 m). Det gir 6 nøster av garn X (1002 m totalt) og 2,5 nøster av garn Y (1000 m totalt). Hvis ønsket garn er 50 g = 150 m, ta utgangspunkt i garnet med kortest løpelengde totalt (her garn Y, 1000 m). Del 1000 på 50: 1000 ÷ 150 ≈ 6,7 → ca. 7 nøster (350 g) av det nye garnet.
            </p>

            <h3>Mengde for vanlige prosjekter</h3>
            <p>Omtrentlig mengde garn for ulike prosjekter — kun veiledende, da avvik avhenger av garntype, tykkelse og strikkefasthet:</p>

                <tr><td>Votter</td><td>Barn</td><td>60–100 m</td></tr>
                <tr><td>Votter</td><td>Voksen</td><td>100–160 m</td></tr>
                <tr><td>Skjerf</td><td>Barn</td><td>150–300 m</td></tr>

                <tr><td>Sokker</td><td>Baby</td><td>50–70 m</td></tr>
                <tr><td>Sokker</td><td>Barn</td><td>70–100 m</td></tr>
                <tr><td>Sokker</td><td>Voksen, kort skaft</td><td>250–350 m</td></tr>
                <tr><td>Sokker</td><td>Voksen, langt skaft</td><td>350–500 m</td></tr>
                <tr><td>Teppe</td><td>Baby 75×100</td><td>600–1000 m</td></tr>

            <h3>Mønster og struktur påvirker forbruket</h3>
            <p>Hvis du tilfører mønster eller struktur i prosjektet, vil dette påvirke antall meter som brukes:</p>
            <table className="htable">
              <thead><tr><th>Teknikk</th><th>Endring i garnforbruk</th></tr></thead>
              <tbody>
                <tr><td>Ribbestrikk</td><td>5–10 % mer garn</td></tr>
                <tr><td>Fletter</td><td>10–25 % mer garn</td></tr>
                <tr><td>Patentstrikk</td><td>30–50 % mer garn</td></tr>
                <tr><td>Strukturmønster</td><td>5–15 % mer garn</td></tr>
                <tr><td>Hullmønster</td><td>5–15 % mindre garn</td></tr>
                <tr><td>Rillestrikk</td><td>5–10 % mer garn</td></tr>
                <tr><td>Dobbelt garn</td><td>40–50 % mer garn</td></tr>
              </tbody>
            </table>
            <p>Dette er kun et omtrentlig estimat, så faktisk forbruk kan variere.</p>
          </section>

          <section id="skalering" ref={(el) => (refs.current["skalering"] = el)}>
            <h2>📐 Skalere maskeantall</h2>
            <p>
              Har du en bunke deilig merinoull du vil strikke med, men oppskriften du drømmer om å strikke ikke samsvarer med garngruppen din? Det kan fint løses — man må bare skalere antall masker opp i mot strikkefastheten til garnet du ønsker å bruke.
            </p>
            <p>
              Strikkefasthet måles i antall masker per 10 cm. Hvis du har færre masker per 10 cm enn hva oppskriften sier, vil plagget bli større — gå ned en pinnestørrelse. Hvis du har flere masker per 10 cm enn oppskriften sier, vil plagget bli mindre — gå opp en pinnestørrelse.
            </p>
            <p>
              Dersom det å justere pinnestørrelsen ikke er nok, må du skalere i forhold til ny strikkefasthet. Si at oppskriften krever 10 m pr. 10 cm, mens garnet du ønsker å bruke gir 18 m pr. 10 cm. Da skalerer du:
            </p>
            <p style={{ fontFamily: "var(--font-mono)", textAlign: "center" }}>18 ÷ 10 = 1,8 (skalafaktor)</p>
            <p>For å finne riktig antall masker du skal bruke i forhold til hva det står i oppskriften, gang antall masker med skalafaktoren: 10 masker × 1,8 = 18 masker pr. 10 cm.</p>

            <h3>Flere eksempler</h3>
            <table className="htable">
              <thead><tr><th>Oppskriftens strikkefasthet</th><th>Din strikkefasthet</th><th>Skalafaktor</th></tr></thead>
              <tbody>
                <tr><td>20</td><td>18</td><td>0,9</td></tr>
                <tr><td>20</td><td>22</td><td>1,1</td></tr>
                <tr><td>24</td><td>20</td><td>0,83</td></tr>
                <tr><td>18</td><td>22</td><td>1,22</td></tr>
                <tr><td>28</td><td>17</td><td>0,6</td></tr>
                <tr><td>12</td><td>31</td><td>2,58</td></tr>
              </tbody>
            </table>

            <h3>Tilpasse bredden (maskeantall)</h3>
            <p>
              Oppskriften sier at du skal legge opp 120 masker ved strikkefasthet på 20 m pr. 10 cm, men din strikkefasthet er 22 m pr. 10 cm.
            </p>
            <p style={{ fontFamily: "var(--font-mono)", textAlign: "center" }}>(22 ÷ 20) × 120 = 132 masker</p>
            <p>Det skal legges opp 132 masker for å få lik bredde på plagget som i opprinnelig oppskrift.</p>

            <h3>Tilpasse lengden (antall omganger)</h3>
            <p>
              Oppskriften sier 60 omganger på 30 cm (20 omg. pr. 10 cm). Din strikkefasthet er 24 omg. pr. 10 cm.
            </p>
            <p style={{ fontFamily: "var(--font-mono)", textAlign: "center" }}>(24 ÷ 20) × 60 = 72 omganger</p>
            <p>Du må strikke 72 omganger for å få lik lengde som i oppskriften.</p>

            <div className="callout">
              <b>Husk</b> — hvis du har flere masker enn oppskriften sier, må du gange med 1,xx. Hvis du har færre masker, må du gange med 0,xx for at antallet skal bli riktig. Vær obs på at hvis oppskriften har et mønster, må du tilpasse maskeantallet slik at det fortsatt er delelig på mønsterrapporten — det kan bli noen omganger hvor du må prøve deg frem.
            </div>
            <p>
              Test alltid ut på en prøvelapp før du setter i gang med et større prosjekt, for å se at resultatet blir som forventet — og at du får riktig antall masker både i bredden og høyden. Mindre justeringer gjøres ofte ved å endre tykkelse på strikkepinnen, mens større justeringer gjøres ved å skalere opp eller ned.
            </p>

            <h3>Maskeantall fra kroppsmål</h3>
            <p>
              Mål av overkropp tas direkte på kroppen eller med tettsittende tøy — ikke stram målebåndet, da vil ikke målene stemme. Legg til 5–10 cm bevegelsesvidde, og inkluder dette i totalmålet når du skal regne antall masker.
            </p>
            <table className="htable">
              <thead><tr><th>Mål</th><th>Beskrivelse</th></tr></thead>
              <tbody>
                <tr><td>Lengdemål (overkropp)</td><td>Fra der plagget skal starte (hofter/midje) og opp til skulder</td></tr>
                <tr><td>Overvidde</td><td>Rundt det bredeste partiet ved brystene</td></tr>
                <tr><td>Armlengde</td><td>Fra håndledd til armhule</td></tr>
                <tr><td>Midjemål</td><td>Rundt det smaleste partiet av midjen</td></tr>
                <tr><td>Hoftemål</td><td>Over det bredeste partiet, ofte over rompa</td></tr>
                <tr><td>Lengdemål (underdel)</td><td>Fra under ankelen til skrittet + opp til linningen</td></tr>
              </tbody>
            </table>
            <p>
              Eksempel: ønsket garn gir 17 m på 10 cm, og omkretsen på plagget skal være 105 cm:
            </p>
            <p style={{ fontFamily: "var(--font-mono)", textAlign: "center" }}>(17 × 105) ÷ 10 = 178,5 ≈ 179 masker</p>
            <p>Dersom dette tallet ikke går opp i forhold til mønsteret eller rapporten, runder du opp til nærmeste tall som blir riktig for ditt mønster.</p>
          </section>

          <section id="teknikker" ref={(el) => (refs.current["teknikker"] = el)}>
            <h2>🪢 Grunnteknikker</h2>

            <h3>Materialer og utstyr</h3>
            <div className="fiber-row">
              <img src="https://images.unsplash.com/photo-1604335398980-26ee5c5f9e9e?w=300&h=240&fit=crop" alt="Strikkepinner og garn" />
              <p style={{ margin: 0 }}>
                <b>Rette pinner / jumperpinner</b> med endestopper er supre til å strikke flate prosjekter, som skjerf. <b>Rundpinner</b> finnes i ulike lengder og er ment for ulike deler av prosjektet — små rundpinner på 40 cm er fine til ermer, rundpinner på 60 cm er fine til å strikke bolen til barneplagg, mens rundpinner på 80 cm passer fint til plagg i voksenstørrelse. <b>Strømpepinner</b> består av et sett med 5 korte pinner og brukes til nettopp strømper og sokker. Rundpinner kan bli for lange når masketallet blir så lite som på sokker eller små barneermer.
              </p>
            </div>
            <p>
              <b>Hjelpepinne</b> har en liten bue i midten og brukes når man skal lage vendinger — man setter av et gitt antall masker på hjelpepinnen, som holder maskene bak eller foran strikketøyet mens man strikker vendingen. Dette kan være ved flettestrikk eller liknende mønsterstrikk.
            </p>

            <h3>Tilbehør</h3>
            <p>
              <b>Maskemarkører</b> er nærmest essensielt når man strikker — velg helst i metall, da plastvarianter kan bli sprø og knekke over tid. <b>Målebånd</b> bør være av stoff, ellers kan målene bli feil. <b>Garnnål</b> er som en vanlig synål, men mye tykkere — brukes for å feste tråder; ha gjerne en med større nåløye for festing av tynnere garn. <b>Saks eller trådkutter</b> bør ligge i tilbehørsmappen — spesielt syntetisk garn har et sterkt behov for trådkutter, ellers vil du garantert få vondt i fingrene av å splitte tråden. <b>Garnskål</b> er kjekt for at garnet ikke skal hoppe rundt på gulvet.
            </p>

            <h3>Opplegg av masker</h3>
            <p>
              Det er flere måter å legge opp masker på. Noen ganger har man behov for elastisk kant, andre ganger er ikke dette så nøye. Det viktigste er at man ikke legger opp for stramt — maskene skal kunne bevege seg lett på pinnen.
            </p>
            <p>
              <b>Long-tail cast-on</b> er en av de vanligste måtene å legge opp masker på, og er svært rask og effektiv. Legg på en vanlig slipknot med god del garn i enden (slipknoten er midt i alt garnet du bruker for å legge opp). Legg en tråd over tommelen og en over pekefingeren. Hent opp masker ved å tre strikkepinnen under garnet på tommelen, over garnet på pekefingeren og ned igjen gjennom tommelgarnet.
            </p>
            <div className="callout">
              <b>Tips</b> — hvis du er redd for å sette av for mye garn kan du bruke både enden av innergarnet og yttergarnet til å legge opp. Da bruker du akkurat den mengden du trenger, og ikke noe mer.
            </div>
            <p>
              <b>Tubular cast-on</b> er en metode som er super for opplegg til ribbekant. Denne gir en elastisk kant som er ideell til luer, sokker og halskanter. Metoden gir ingen definert begynnelse og gir dermed en sømløs finish.
            </p>

            <h3>Ribbestrikk</h3>
            <p>
              Ribbestrikk brukes ofte for å unngå at kanter ruller opp, for å gjøre åpninger mer elastiske, og for å gi en mer tettsittende fasong. Standard ribbestrikk er ulike kombinasjoner av rette og vrangmasker, f.eks. 1 r, 1 vr eller 2 r, 2 vr. Dette gir et smalt utseende og er en svært vanlig og anvendelig teknikk.
            </p>

            <h3>Italiensk ribb (tubular ribbing)</h3>
            <p>
              Stikk nålen inn i 1. maske som om den skal strikkes vrang og stram til. Ikke slipp masken av pinnen. Stikk nålen fra baksiden mellom 1. og 2. maske slik at tråden kommer på forsiden, så stikk nålen inn i vrangmasken. Deretter stikk nålen inn i 1. maske som om den skal strikkes rett, løft masken av pinnen.
            </p>
            <p>Når avfellingen starter:</p>
            <p>
              <b>1)</b> Når det er en vrang maske som skal felles av: stikk nålen inn i 2. maske (rettmaske) som om den skal strikkes vrang, stikk nålen inn i 1. maske (vrangmaske) som om den skal strikkes rett, løft masken av (tråden er nå på baksiden av arbeidet).
            </p>
            <p>
              <b>2)</b> Når det er en rett maske som skal felles av: fra baksiden, stikk nålen mellom 1. og 2. maske. Fra forsiden, stikk nålen inn i vrangmasken (2. maske), også fra rettsiden stikk nålen inn i 1. maske som om den skal strikkes rett og løft av masken.
            </p>
            <p>
              Gjenta 1) og 2) til arbeidet er ferdig avfelt. Italiensk ribb likner standard ribbestrikk, men har en mer avrundet og fyldig kant. Den har noe mindre spenst og tar noe lenger tid å strikke. Brukes ofte ved opplegg av masker eller ved avfelling av vanlig ribbestrikk.
            </p>

            <h3>Engelsk ribb (brioche ribbing)</h3>
            <p>Strikkes 1 r, 1 kast, 2 m sammen. Gir en svært luftig og elastisk kant. Bruker noe mer garn enn vanlig ribb.</p>

            <h3>Diagram</h3>
            <p>
              Dersom du skal lage ditt eget design, kan det være greit å få ned rapporter i et diagram. Strikkediagram leses nedenfra og opp, fra høyre til venstre (eventuelt høyre til venstre, venstre til høyre ved strikking frem og tilbake i stedet for rundstrikk). Klammer ([ ]) brukes for å vise at mønsteret skal gjentas. Bruk symboler i diagrammet med symbolforklaring på siden av diagrammet.
            </p>
          </section>

          <section id="prosjekter" ref={(el) => (refs.current["prosjekter"] = el)}>
            <h2>✨ Prosjektideer for restegarn</h2>
            <p>
              Det er veldig vanlig å bruke restegarn til småting, som sokker, babytøy, sjal og pannebånd. Men noen ganger kan det være litt gøy å bruke restegarnet til større prosjekter, som dekorative pledd, deilige gensere eller fine kofter.
            </p>

            <h3>Små prosjekter</h3>
            <p>
              Småstrikk er greit hvis du har et par nøster av samme farge og ønsker å strikke noe kjapt. En lue i garngruppe C krever ikke stort mer enn 100 g garn og er gjerne strikket på en kveld eller to.
            </p>
            <p>
              Sokker er ofte tryggere å prøve seg frem med ulike fargekombinasjoner, ettersom sokker er et mer diskret plagg enn f.eks. et skjerf eller en lue. Det skal ikke så mye garn til for å få til et gøyalt mønster, og hvis du vil ha en liten utfordring kan du tegne opp ditt eget mønster. Det verste som kan skje er at du får noen morsomme sokker som uansett holder deg varm på beina.
            </p>
            <p>
              Babystrikk gir mange muligheter for å bruke opp restegarn. Likt som sokker trenger man ikke stort mer enn 100–200 g garn til et fullt sett, hvis det er en oppskrift med lite mønsterstrikk. Babyplagg er også kjapt å strikke, så her får du unna litt av restelageret ditt på kort tid.
            </p>

            <div className="callout">
              <b>Idé</b> — registrer prosjektene dine i "Prosjekter"-fanen og koble dem til garnet du bruker. Da ser du raskt hvilket garn som er i bruk, og kan planlegge neste restegarnprosjekt basert på hva som blir ledig.
            </div>
          </section>
        </div>
      </div>
    </div>
  );
}
